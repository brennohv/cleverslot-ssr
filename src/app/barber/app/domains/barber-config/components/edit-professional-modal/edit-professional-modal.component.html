<h2 mat-dialog-title>{{ data.title | transloco }}</h2>
<mat-dialog-content>
  <div class="row">
    <div class="col-12 p-2">
        <div>
            <lib-input [label]="I18N_PREFFIX + data.contentView | transloco" [formControlRef]="formControl"></lib-input>
          </div>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button color="accent" (click)="closeModal()">{{'shared.cancel' | transloco}}</button>
  <button mat-button color="primary" (click)="changeUser()" cdkFocusInitial>{{'shared.edit' | transloco}}</button>
</mat-dialog-actions>
